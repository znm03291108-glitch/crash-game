<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>爆点逃跑王 V2</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header class="top-header">
      <div>
        <h1>爆点逃跑王</h1>
        <p>登录昵称，冲击排行榜！</p>
      </div>

      <div class="coin-box">
        <span>金币</span>
        <strong id="coins">1000</strong>
      </div>
    </header>

    <section id="loginCard" class="login-card">
      <h2>玩家登录</h2>
      <p>输入昵称即可开始游戏</p>

      <input id="nicknameInput" class="login-input" placeholder="请输入玩家昵称" maxlength="12" />

      <button onclick="loginPlayer()" class="login-btn">进入游戏</button>

      <div class="login-tip">
        试玩版：数据保存在当前手机浏览器中
      </div>
    </section>

    <section id="playerBar" class="player-bar hidden">
      <div>
        <span>当前玩家</span>
        <strong id="playerName">游客</strong>
      </div>

      <div>
        <span>邀请码</span>
        <strong id="inviteCode">--</strong>
      </div>

      <button onclick="logoutPlayer()">切换玩家</button>
    </section>

    <nav id="tabs" class="tabs hidden">
      <button id="gameTabBtn" class="active" onclick="showTab('game')">游戏</button>
      <button id="rankTabBtn" onclick="showTab('rank')">排行榜</button>
      <button id="recordTabBtn" onclick="showTab('record')">记录</button>
    </nav>

    <main id="gameTab" class="tab-page">
      <section class="game-card">
        <div class="status" id="status">准备开始</div>

        <div class="multiplier" id="multiplier">1.00x</div>

        <div class="rocket-area">
          <div class="rocket" id="rocket">🚀</div>
          <div class="line"></div>
        </div>

        <div class="info-grid">
          <div>
            <span>本局下注</span>
            <strong id="betShow">10</strong>
          </div>
          <div>
            <span>预计收益</span>
            <strong id="profitShow">0</strong>
          </div>
          <div>
            <span>我的最高</span>
            <strong id="bestScore">0</strong>
          </div>
        </div>

        <div class="bet-box">
          <button onclick="changeBet(-10)">-10</button>
          <input id="betInput" type="number" value="10" min="10" step="10" />
          <button onclick="changeBet(10)">+10</button>
        </div>

        <div class="buttons">
          <button id="startBtn" onclick="startGame()">开始游戏</button>
          <button id="cashoutBtn" onclick="cashOut()" disabled>立即逃跑</button>
        </div>
      </section>

      <section class="panel">
        <h2>游戏规则</h2>
        <ul>
          <li>输入昵称后开始游戏。</li>
          <li>点击开始后，倍率会不断上涨。</li>
          <li>爆点前点击“立即逃跑”，按当前倍率结算金币。</li>
          <li>没有逃跑就爆点，本局下注归零。</li>
          <li>逃跑盈利越高，排行榜名次越高。</li>
        </ul>
      </section>
    </main>

    <main id="rankTab" class="tab-page hidden">
      <section class="panel">
        <div class="panel-title-row">
          <h2>排行榜</h2>
          <button onclick="renderRanking()">刷新</button>
        </div>

        <div class="rank-tabs">
          <button id="todayRankBtn" class="active" onclick="switchRank('today')">今日榜</button>
          <button id="allRankBtn" onclick="switchRank('all')">总榜</button>
        </div>

        <div id="rankingList" class="ranking-list"></div>
      </section>
    </main>

    <main id="recordTab" class="tab-page hidden">
      <section class="panel">
        <div class="panel-title-row">
          <h2>最近记录</h2>
          <button onclick="resetMyData()">重置我的数据</button>
        </div>

        <div id="history" class="history"></div>
      </section>
    </main>

    <section class="admin-entry">
      <button onclick="openAdmin()">管理员入口</button>
    </section>

    <div id="adminModal" class="modal hidden">
      <div class="modal-box">
        <h2>管理员面板</h2>
        <p>V2 预留入口，V3 可升级后台参数控制。</p>

        <div class="admin-info">
          <div>
            <span>玩家数量</span>
            <strong id="adminPlayerCount">0</strong>
          </div>

          <div>
            <span>记录数量</span>
            <strong id="adminRecordCount">0</strong>
          </div>
        </div>

        <button onclick="closeAdmin()">关闭</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
